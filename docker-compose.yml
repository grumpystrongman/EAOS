version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env.example
    environment:
      POSTGRES_DB: openaegis
      POSTGRES_USER: openaegis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openaegis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Bus
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Object Storage
  minio:
    image: minio/minio
    env_file:
      - .env.example
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-change-me-local-access-key}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local-secret-key}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway (placeholder)
  api-gateway:
    build:
      context: .
      dockerfile: backend/services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL:-postgresql://openaegis:change-me-local-postgres@postgres:5432/openaegis}
      - REDIS_URL=redis://redis:6379

  # Auth Service (placeholder)
  auth-service:
    build:
      context: .
      dockerfile: backend/services/auth-service/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL:-postgresql://openaegis:change-me-local-postgres@postgres:5432/openaegis}
      - REDIS_URL=redis://redis:6379

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/apps/admin-console/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  minio_data:

