{{- range .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    {{- include "openaegis.labels" $ | nindent 4 }}
    app: {{ .name }}
spec:
  replicas: {{ .replicas | default $.Values.global.replicas }}
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
        openaegis.io/mesh-participant: "true"
        {{- include "openaegis.labels" $ | nindent 8 }}
    spec:
      serviceAccountName: {{ include "openaegis.fullname" $ }}-runtime
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .name }}
          image: "{{ $.Values.global.imageRegistry }}/{{ .name }}:{{ default $.Chart.AppVersion $.Values.global.imageTag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .port }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "{{ .port }}"
            - name: OPENAEGIS_ENFORCE_MTLS
              value: "{{ $.Values.global.enforceMtls }}"
            - name: OPENAEGIS_TRUST_PROXY_MTLS_HEADERS
              value: "{{ $.Values.global.trustProxyMtlsHeaders }}"
            {{- if and (eq .name "auth-service") $.Values.global.authSigningKeySecretName $.Values.global.authSigningKeySecretKey }}
            - name: OPENAEGIS_AUTH_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.authSigningKeySecretName }}
                  key: {{ $.Values.global.authSigningKeySecretKey }}
            {{- end }}
          resources:
            {{- toYaml $.Values.global.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
