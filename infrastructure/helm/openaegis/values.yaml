nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ghcr.io/grumpystrongman/openaegis
  imageTag: "0.2.0"
  replicas: 2
  enforceMtls: "true"
  trustProxyMtlsHeaders: "true"
  authSigningKeySecretName: openaegis-auth
  authSigningKeySecretKey: signingKey
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

services:
  - name: api-gateway
    port: 3000
  - name: auth-service
    port: 3001
  - name: tenant-service
    port: 3002
  - name: policy-service
    port: 3003
  - name: workflow-orchestrator
    port: 3004
  - name: agent-registry
    port: 3005
  - name: tool-registry
    port: 3006
  - name: tool-execution-service
    port: 3007
  - name: model-broker
    port: 3008
  - name: context-retrieval-service
    port: 3009
  - name: classification-service
    port: 3010
  - name: approval-service
    port: 3011
  - name: audit-ledger
    port: 3012
  - name: notification-service
    port: 3013
  - name: secrets-broker
    port: 3014
  - name: observability-service
    port: 3015
  - name: kill-switch-service
    port: 3016
