image:
  repository: ghcr.io/openaegis/api-gateway
  tag: latest

securityContext:
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

env:
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  POLICY_DECISION_MODE: enforce
