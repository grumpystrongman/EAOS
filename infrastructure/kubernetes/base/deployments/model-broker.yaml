apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-broker
  namespace: openaegis
  labels:
    app: model-broker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-broker
  template:
    metadata:
      labels:
        app: model-broker
        openaegis.io/mesh-participant: "true"
    spec:
      serviceAccountName: openaegis-runtime
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: model-broker
          image: ghcr.io/grumpystrongman/openaegis/model-broker:0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3008
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3008"
            - name: OPENAEGIS_ENFORCE_MTLS
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
