apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-mesh
  namespace: openaegis
spec:
  podSelector:
    matchLabels:
      openaegis.io/mesh-participant: "true"
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              openaegis.io/mesh-participant: "true"
  egress:
    - to:
        - podSelector:
            matchLabels:
              openaegis.io/mesh-participant: "true"
